name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts 2>&1 || echo "⚠️ ssh-keyscan failed, continuing..."

      - name: Deploy via SCP
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          echo "🚀 开始部署..."
          # 先清理远程目录
          ssh -p $SERVER_PORT $SERVER_USER@$SERVER_HOST "rm -rf $DEPLOY_PATH/*"
          # 使用 scp 部署
          scp -P $SERVER_PORT -r src/* $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/
          echo "✅ 部署完成"

      - name: Health check
        run: |
          echo "✅ 部署完成"
          echo "访问: https://win.clawing.work"